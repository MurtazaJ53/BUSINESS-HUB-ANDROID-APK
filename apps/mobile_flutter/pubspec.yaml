name: business_hub_mobile
description: Flutter mobile app for Business Hub.
publish_to: "none"
version: 1.3.8+8

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_crashlytics: ^5.2.0
  firebase_performance: ^0.11.3
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  mobile_scanner: ^7.2.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.14.1
  drift_dev: ^2.32.1

flutter:
  uses-material-design: true
